# Publish dsoxlab to PyPI when a version tag (vX.Y.Z) is pushed.
#
# Security model:
# - PyPI Trusted Publishing (OIDC). No API token or long-lived secret: the
#   `publish` job mints a short-lived id-token that PyPI trusts. Configure the
#   trusted publisher on PyPI (project: dsoxlab, workflow: release.yml,
#   environment: pypi) before the first release.
# - Privilege separation: `build` compiles the artifacts with read-only access
#   and runs project code; `publish` runs no project code, only downloads the
#   built artifacts and hands them to PyPI with `id-token: write`.
# - The `pypi` GitHub Environment gates the publish step (add required
#   reviewers / tag protection there for a manual approval before upload).
# - Every action is pinned to a full commit SHA; the default token has no
#   permissions; no build cache in the publishing path (cache-poisoning
#   hardening).
name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write       # mint the OIDC token used to sign the provenance
      attestations: write   # record the SLSA build provenance for the artifacts
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.26"
          enable-cache: false   # no cache in the publishing path (cache-poisoning hardening)

      - name: Build sdist and wheel
        run: uv build

      - name: Check distribution metadata
        run: uvx twine check dist/*

      # SLSA build provenance for the wheel and sdist, verifiable with
      # `gh attestation verify <artifact> --repo stephrobert/dsoxlab` or
      # slsa-verifier. Complements the PEP 740 attestations PyPI records.
      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/*'

      # The attestation above is recorded on GitHub's attestation API, which is
      # what `gh attestation verify` reads. It is NOT what OpenSSF Scorecard's
      # Signed-Releases control looks at: that check wants a `*.intoto.jsonl`
      # file attached as a release asset — a distinct artifact. Copy the bundle
      # out under the expected name so `github_release` can attach it.
      #
      # The bundle path goes through `env:` rather than being interpolated into
      # the script body, so no step output is ever expanded into shell code.
      - name: Stage the provenance bundle as a release asset
        env:
          BUNDLE_PATH: ${{ steps.attest.outputs.bundle-path }}
        run: |
          set -euo pipefail
          cp "$BUNDLE_PATH" provenance.intoto.jsonl
          echo "Provenance bundle staged ($(wc -c < provenance.intoto.jsonl) bytes)"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 1

      - name: Upload provenance artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: provenance
          path: provenance.intoto.jsonl
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/dsoxlab
    permissions:
      id-token: write   # OIDC token for Trusted Publishing — the only scope needed
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Download distribution artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
          print-hash: true

  github_release:
    name: Create GitHub Release
    # Only after PyPI succeeds — never publish a GitHub Release for a version
    # that failed to reach PyPI.
    needs: [build, publish]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write   # create the Release and upload the built artifacts
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Download distribution artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Download provenance artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: provenance
          path: .

      # Extract the CHANGELOG section for this tag. The tag is passed through an
      # env var (never interpolated into the script body) to avoid injection.
      - name: Extract changelog notes
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          python3 - "$version" > release-notes.md <<'PY'
          import pathlib, re, sys

          version = sys.argv[1]
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          m = re.search(
              r"^## \[" + re.escape(version) + r"\].*?(?=^## \[|\Z)",
              text, re.S | re.M,
          )
          body = m.group(0).strip() if m else f"Release {version}"
          lines = body.splitlines()
          if lines and lines[0].startswith("## "):
              lines = lines[1:]           # drop the version heading (title carries it)
          print("\n".join(lines).strip() or f"Release {version}")
          PY

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          gh release create "$TAG" \
            --repo "$REPO" \
            --title "$TAG" \
            --notes-file release-notes.md \
            dist/* provenance.intoto.jsonl
