# Contribution gate. zizmor statically analyzes the workflows first, as a fast
# security gate; the heavier jobs (quality matrix, CodeQL) only run once it
# passes, so an insecure workflow fails fast without burning runners.
#
# Deeper CI/CD policy scanning and the compliance score live in plumber.yml
# (trusted context only); supply-chain posture in scorecard.yml.
#
# Hardening baseline: every action is pinned to a full commit SHA, the default
# token has no permissions, each job grants only what it needs, checkout never
# persists credentials, and jobs are time-boxed.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Deny-by-default: jobs opt into the scopes they need, nothing is inherited.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast security gate — the quality and CodeQL jobs depend on it.
  zizmor:
    name: Zizmor (workflow static analysis)
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # Gate-only (no SARIF upload) so the check also passes on pull requests
      # from forks, where the token cannot write to code scanning. Findings in
      # the Security tab come from CodeQL and plumber.yml on same-repo events.
      - name: Zizmor
        uses: zizmorcore/zizmor-action@192e21d79ab29983730a13d1382995c2307fbcaa # v0.5.7
        with:
          version: "1.26.1"
          advanced-security: false

  quality:
    name: Lint, type-check and test (py${{ matrix.python-version }})
    needs: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    env:
      # Passed through the environment (not template-expanded into run blocks)
      # so no context value is ever interpolated into shell code.
      PYTHON_VERSION: ${{ matrix.python-version }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }}
        run: uv python install "$PYTHON_VERSION"

      - name: Sync dependencies (locked)
        run: uv sync --frozen --python "$PYTHON_VERSION"

      - name: Lint and security (ruff)
        run: uv run ruff check src/dsoxlab tests

      - name: Type-check (mypy strict)
        run: uv run mypy src/dsoxlab

      - name: Test (pytest)
        run: uv run pytest

  # Parity gate — run EVERY pre-commit hook (commit AND push stages) exactly as
  # a contributor's local pre-commit would, from this project's locked env. The
  # quality matrix above proves the code works on every supported Python; this
  # job proves nothing enforced locally (hygiene, ruff, mypy, trufflehog,
  # pytest) can be slipped past with `git commit --no-verify`. It runs the
  # committed .pre-commit-config.yaml itself — no hand-maintained copy to drift.
  pre-commit:
    name: Pre-commit parity (all hooks)
    needs: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # trufflehog walks git history

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "0.11.26"
          enable-cache: true

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      - name: Install trufflehog (verified release binary; the hook runs with --no-update)
        # Download the pinned release tarball and verify its SHA-256 against the
        # published checksums before use — no piped remote script (Plumber
        # ISSUE-411). Same version as the local pre-commit toolchain.
        env:
          TRUFFLEHOG_VERSION: "3.95.2"
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          base="https://github.com/trufflesecurity/trufflehog/releases/download/v${TRUFFLEHOG_VERSION}"
          asset="trufflehog_${TRUFFLEHOG_VERSION}_linux_amd64.tar.gz"
          curl -fsSL -o "${workdir}/${asset}" "${base}/${asset}"
          curl -fsSL -o "${workdir}/checksums.txt" "${base}/trufflehog_${TRUFFLEHOG_VERSION}_checksums.txt"
          (cd "${workdir}" && grep " ${asset}$" checksums.txt | sha256sum -c -)
          tar -xzf "${workdir}/${asset}" -C "${workdir}" trufflehog
          sudo install -m 0755 "${workdir}/trufflehog" /usr/local/bin/trufflehog
          trufflehog --version

      - name: Run every hook (commit stage)
        run: uv run pre-commit run --all-files --show-diff-on-failure --color always

      - name: Run every hook (push stage)
        run: uv run pre-commit run --all-files --hook-stage pre-push --show-diff-on-failure --color always

  codeql:
    name: CodeQL analyze (python)
    needs: zizmor
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write   # upload the CodeQL results to Code Scanning
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: python
          build-mode: none   # Python is interpreted, no build step to observe

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:python"
